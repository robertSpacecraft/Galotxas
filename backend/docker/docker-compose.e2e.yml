services:
  app:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www
    volumes:
      - ..:/var/www
    environment:
      APP_NAME: Galotxas E2E
      APP_ENV: e2e
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: "false"
      APP_URL: http://127.0.0.1:${E2E_BACKEND_PORT:-8081}
      FRONTEND_URL: http://127.0.0.1:${E2E_FRONTEND_PORT:-5174}
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      DB_CONNECTION: mariadb
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: galotxas_e2e
      DB_USERNAME: galotxas_e2e
      DB_PASSWORD: galotxas_e2e
      CACHE_STORE: array
      SESSION_DRIVER: cookie
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
    depends_on:
      db:
        condition: service_healthy
    networks:
      - e2e

  web:
    image: nginx:1.27-alpine
    ports:
      - "${E2E_BACKEND_PORT:-8081}:80"
    volumes:
      - ..:/var/www
      - ./app/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - e2e

  db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: galotxas_e2e
      MARIADB_USER: galotxas_e2e
      MARIADB_PASSWORD: galotxas_e2e
      MARIADB_ROOT_PASSWORD: galotxas_e2e_root
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - e2e

  runner:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    profiles: ["runner"]
    working_dir: /workspace/frontend
    user: "${E2E_UID:-1000}:${E2E_GID:-1000}"
    volumes:
      - ../..:/workspace
    environment:
      E2E_BASE_URL: "${E2E_BASE_URL:-}"
      E2E_BACKEND_URL: "${E2E_BACKEND_URL:-http://web}"
      E2E_FRONTEND_PORT: "${E2E_FRONTEND_PORT:-5174}"
      E2E_SKIP_WEBSERVER: "${E2E_SKIP_WEBSERVER:-}"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      TMPDIR: /tmp
      TMP: /tmp
      TEMP: /tmp
    shm_size: 1gb
    depends_on:
      web:
        condition: service_healthy
    networks:
      - e2e

networks:
  e2e:
    driver: bridge
