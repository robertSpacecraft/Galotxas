services:
  app:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    container_name: galotxas_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ..:/var/www
    depends_on:
      - db
    networks:
      - galotxas_net

  web:
    image: nginx:1.27-alpine
    container_name: galotxas_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www
      - ./app/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - galotxas_net

  db:
    image: mariadb:11.4
    container_name: galotxas_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: galotxas
      MARIADB_USER: galotxas
      MARIADB_PASSWORD: galotxas
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - galotxas_db_data:/var/lib/mysql
    networks:
      - galotxas_net

  test-db:
    image: mariadb:11.4
    profiles: ["test"]
    environment:
      MARIADB_DATABASE: galotxas_testing
      MARIADB_USER: galotxas_test
      MARIADB_PASSWORD: galotxas_test
      MARIADB_ROOT_PASSWORD: root_test
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - galotxas_net

  test:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    profiles: ["test"]
    working_dir: /var/www
    volumes:
      - ..:/var/www
    environment:
      APP_ENV: testing
      DB_CONNECTION: mariadb
      DB_HOST: test-db
      DB_PORT: 3306
      DB_DATABASE: galotxas_testing
      DB_USERNAME: galotxas_test
      DB_PASSWORD: galotxas_test
    depends_on:
      test-db:
        condition: service_healthy
    command: php artisan test
    networks:
      - galotxas_net

volumes:
  galotxas_db_data:

networks:
  galotxas_net:
    driver: bridge
