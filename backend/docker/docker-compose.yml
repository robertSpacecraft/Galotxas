services:
  app:
    build:
      context: ..
      dockerfile: docker/app/Dockerfile
    container_name: galotxas_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ..:/var/www
    depends_on:
      - db
    networks:
      - galotxas_net

  web:
    image: nginx:1.27-alpine
    container_name: galotxas_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www
      - ./app/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - galotxas_net

  db:
    image: mariadb:11.4
    container_name: galotxas_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - galotxas_db_data:/var/lib/mysql
    networks:
      - galotxas_net

volumes:
  galotxas_db_data:


networks:
  galotxas_net:
    driver: bridge
